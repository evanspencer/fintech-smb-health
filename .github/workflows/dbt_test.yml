name: dbt CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate synthetic data
        run: python generate/synthetic_data.py

      - name: dbt run
        run: cd smb_health_dbt && dbt run --profiles-dir .

      - name: dbt test
        run: cd smb_health_dbt && dbt test --profiles-dir .

version: 2

models:
  - name: stg_companies
    description: "Cleaned and typed companies — one row per SMB customer."
    columns:
      - name: company_id
        tests:
          - not_null
          - unique
      - name: health_segment
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["healthy", "watch", "at_risk"]

  - name: stg_transactions
    description: "Cleaned and typed payment transactions with derived flags."
    columns:
      - name: txn_id
        tests:
          - not_null
          - unique
      - name: txn_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["completed", "failed", "pending"]

  - name: stg_payments
    description: "Cleaned and typed billing-cycle payments with derived flags."
    columns:
      - name: payment_id
        tests:
          - not_null
          - unique
      - name: payment_status
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["on_time", "late", "missed"]
